<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STREAM BOP BY EASEKID</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Inter:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 40%, #0d1f3c 70%, #080f20 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
  }

  .scene {
    position: relative;
    width: 420px;
    height: 750px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene::before {
    content: '';
    position: absolute;
    inset: -80px;
    background: radial-gradient(ellipse at 50% 30%, rgba(30,80,180,0.35) 0%, rgba(10,20,60,0.1) 60%, transparent 80%),
                radial-gradient(ellipse at 80% 80%, rgba(0,200,150,0.1) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .horizon {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 160px;
    background: linear-gradient(to top, rgba(120,80,40,0.3) 0%, transparent 100%);
    z-index: 1;
    filter: blur(8px);
  }

  .artist {
    position: absolute;
    z-index: 5;
    width: 300px;
    height: 420px;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%);
  }

  .artist img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center center;
    filter: brightness(1.05) contrast(1.08) saturate(0.8);
    mask-image: linear-gradient(to bottom, black 0%, black 70%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, black 0%, black 70%, transparent 100%);
  }

  /* ── Card base ── */
  .card {
    position: absolute;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    background: rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 10px 14px;
    z-index: 10;
    animation: float linear infinite;
    cursor: pointer;
    transition: transform 0.25s, box-shadow 0.25s;
    text-decoration: none;
    display: block;
  }

  .card:hover {
    transform: scale(1.06) !important;
    box-shadow: 0 0 28px rgba(255,255,255,0.18);
  }

  .card::after {
    content: 'TAP TO LISTEN →';
    position: absolute;
    bottom: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.55);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .card:hover::after { opacity: 1; }

  .card-inner {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card-thumb {
    width: 40px; height: 40px;
    border-radius: 8px;
    flex-shrink: 0;
    background: rgba(255,255,255,0.12);
    overflow: hidden;
  }
  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: brightness(0.85) saturate(0.7);
  }

  .card-info { flex: 1; min-width: 0; }
  .card-title  { font-size: 12px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-artist { font-size: 10px; color: rgba(255,255,255,0.6); margin-top: 1px; }
  .card-platform { font-size: 9px; font-weight: 700; margin-top: 3px; letter-spacing: 0.03em; }

  .card-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 7px;
  }

  .ctrl-btn {
    background: none; border: none;
    color: rgba(255,255,255,0.8);
    font-size: 14px; cursor: pointer;
    padding: 0; line-height: 1;
    transition: transform 0.15s, color 0.15s;
    position: relative; z-index: 20;
  }
  .ctrl-btn:hover { transform: scale(1.3); color: #fff; }

  .play-btn {
    font-size: 16px; color: #fff;
    background: rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.15s;
  }
  .play-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.15); }
  .play-btn.playing { color: #fff; }

  .progress-bar {
    flex: 1; height: 3px;
    background: rgba(255,255,255,0.2);
    border-radius: 99px; overflow: hidden; cursor: pointer;
  }
  .progress-fill {
    height: 100%; border-radius: 99px;
    background: currentColor; transition: width 0.3s;
  }
  .time { font-size: 9px; color: rgba(255,255,255,0.5); white-space: nowrap; }

  /* ── Platform colours ── */
  .spotify { border: 1.5px solid rgba(29,185,84,0.6); }
  .spotify .card-platform { color: #1DB954; }
  .spotify .progress-fill { background: #1DB954; }
  .spotify .play-btn:hover { background: rgba(29,185,84,0.3); }

  .apple { border: 1.5px solid rgba(252,80,80,0.6); }
  .apple .card-platform { color: #fc6060; }
  .apple .progress-fill { background: #fc6060; }

  .youtube { border: 1.5px solid rgba(255,60,60,0.6); }
  .youtube .card-platform { color: #FF0000; }
  .youtube .progress-fill { background: #FF0000; }

  .amazon { border: 1.5px solid rgba(0,168,225,0.6); }
  .amazon .card-platform { color: #00A8E1; }
  .amazon .progress-fill { background: #00A8E1; }

  /* ── Support card — warm gold/rose tones ── */
  .support-card {
    border: 1.5px solid rgba(255,200,80,0.5);
    background: rgba(255,180,50,0.06);
  }
  .support-card::after { content: 'TAP TO SUPPORT →'; }
  .support-card:hover {
    box-shadow: 0 0 28px rgba(255,200,80,0.25);
  }
  .support-inner {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .support-icon {
    font-size: 26px;
    line-height: 1;
    flex-shrink: 0;
    animation: heartbeat 2.4s ease-in-out infinite;
    display: inline-block;
  }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    14%       { transform: scale(1.3); }
    28%       { transform: scale(1); }
    42%       { transform: scale(1.18); }
    56%       { transform: scale(1); }
  }
  .support-text { flex: 1; min-width: 0; }
  .support-label {
    font-size: 11px; font-weight: 700;
    color: rgba(255,210,100,0.95);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .support-sub {
    font-size: 9px;
    color: rgba(255,255,255,0.45);
    margin-top: 3px;
    line-height: 1.4;
  }
  .support-cta {
    font-size: 8px; font-weight: 700;
    letter-spacing: 1.2px;
    color: rgba(255,200,80,0.7);
    text-transform: uppercase;
    margin-top: 6px;
    border-top: 1px solid rgba(255,200,80,0.15);
    padding-top: 5px;
    text-align: center;
  }

  /* ── Card positions & animation ── */
  .c1 { width: 200px; top: 10%; left: -10%; animation-duration: 6s; animation-delay: 0s; }
  .c2 { width: 190px; top: 18%; right: -8%; animation-duration: 7s; animation-delay: -2s; filter: blur(0.5px); }
  .c3 { width: 210px; top: 40%; left: -12%; animation-duration: 5.5s; animation-delay: -1s; z-index: 12; }
  /* c4 = Amazon (was Boomplay position — mid right) */
  .c4 { width: 185px; top: 45%; right: -10%; animation-duration: 8s; animation-delay: -3s; filter: blur(0.5px); }
  /* c5 = Support card (was Amazon position — bottom left) */
  .c5 { width: 175px; bottom: 22%; left: -6%; animation-duration: 6.5s; animation-delay: -0.5s; filter: blur(1px); z-index: 3; }
  .c7 { width: 130px; top: 5%; right: 20%; animation-duration: 9s; animation-delay: -4s; filter: blur(2px); opacity: 0.6; z-index: 2; }
  .c8 { width: 120px; top: 2%; left: 25%; animation-duration: 10s; animation-delay: -1.5s; filter: blur(3px); opacity: 0.4; z-index: 2; }

  @keyframes float {
    0%   { transform: translateY(0px) rotate(0deg); }
    33%  { transform: translateY(-8px) rotate(-0.5deg); }
    66%  { transform: translateY(4px) rotate(0.5deg); }
    100% { transform: translateY(0px) rotate(0deg); }
  }

  /* ── Song title ── */
  .song-title {
    position: absolute;
    top: 4%; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    text-align: center;
    pointer-events: none;
  }
  .song-title h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: 42px;
    color: #fff;
    text-shadow: 0 0 40px rgba(100,180,255,0.6), 0 2px 20px rgba(0,0,0,0.8);
    letter-spacing: 6px;
  }
  .song-title p {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* ── Ambient orbs ── */
  .orb { position: absolute; border-radius: 50%; filter: blur(60px); pointer-events: none; z-index: 0; }
  .orb1 { width: 200px; height: 200px; background: rgba(30,100,200,0.25); top: 20%; left: 10%; }
  .orb2 { width: 150px; height: 150px; background: rgba(0,200,130,0.15); bottom: 20%; right: 10%; }
  .orb3 { width: 100px; height: 100px; background: rgba(180,80,255,0.12); top: 60%; left: 30%; }
  /* warm orb near support card */
  .orb4 { width: 120px; height: 80px; background: rgba(255,160,40,0.08); bottom: 25%; left: 5%; }

  /* ── Toast notification ── */
  .toast {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    padding: 10px 20px;
    border-radius: 99px;
    font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
    z-index: 999;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
    opacity: 0;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>

let activeBtn = null;

function handlePlay(e, btn) {
  e.preventDefault();
  e.stopPropagation();
  const url = btn.dataset.url;
  const card = btn.closest('.card');
  const platform = card.dataset.platform;
  if (activeBtn && activeBtn !== btn) {
    activeBtn.textContent = '▶';
    activeBtn.classList.remove('playing');
  }
  if (btn.classList.contains('playing')) {
    btn.textContent = '⏸';
    showToast(`Opening ${platform}…`);
    setTimeout(() => window.open(url, '_blank'), 400);
  } else {
    btn.textContent = '⏸';
    btn.classList.add('playing');
    activeBtn = btn;
    showToast(`▶  Opening ${platform} to play BOP…`);
    setTimeout(() => window.open(url, '_blank'), 480);
  }
}

function handleCtrl(e) {
  e.preventDefault();
  e.stopPropagation();
  const card = e.currentTarget.closest('.card');
  if (card && card.href) {
    const platform = card.dataset.platform || 'the platform';
    showToast(`Opening ${platform}…`);
    setTimeout(() => window.open(card.href, '_blank'), 300);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
}
</script>

<script>
function scaleScene() {
  const scene = document.querySelector('.scene');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / 420, vh / 750, 1);
  scene.style.transform = 'scale(' + scale + ')';
  scene.style.transformOrigin = 'center center';
  scene.style.position = 'fixed';
  scene.style.top = '50%';
  scene.style.left = '50%';
  scene.style.marginTop = '-375px';
  scene.style.marginLeft = '-210px';
}
scaleScene();
window.addEventListener('resize', scaleScene);
</script>
</body>
</html>
